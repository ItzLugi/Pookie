    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --bg-deep: #0f172a;
            --glass: rgba(15, 23, 42, 0.6);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #2e1065 0%, #0f172a 100%);
            font-family: 'Inter', sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        #photo-viewport {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .floating-photo {
            position: absolute;
            border-radius: 10px;
            border: 3px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            opacity: 0.6;
            animation: driftUp linear infinite;
            object-fit: cover;
        }

        @keyframes driftUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-30vh) rotate(360deg); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            pointer-events: none;
        }

        .focus-box {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 85%;
            max-width: 600px;
            padding: 30px 20px;
            border-radius: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            pointer-events: auto;
            animation: boxEntry 1.5s ease;
        }

        @keyframes boxEntry { from { opacity: 0; transform: translateY(30px); } }

        h1 { font-family: 'Dancing Script', cursive; font-size: 4rem; color: var(--primary); margin: 0 0 5px 0; }
        .subtitle { font-weight: 300; font-size: 0.9rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 2px; }

        #ticker { font-weight: 900; font-size: 1.2rem; color: white; margin: 15px 0 25px 0; font-variant-numeric: tabular-nums; }
        #ticker span { color: var(--primary); font-size: 0.8rem; font-weight: 300; }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            border: 2px solid var(--primary);
        }

        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .heart-link {
            display: inline-block;
            text-decoration: none;
            margin-top: 20px;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .heart-icon { font-size: 2.5rem; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        .click-hint { font-size: 0.7rem; color: var(--primary); margin-top: 5px; opacity: 0.7; }

        /* --- MOBILE ADAPTATION --- */
        @media (max-width: 480px) {
            h1 { font-size: 2.8rem; }
            .subtitle { font-size: 0.75rem; letter-spacing: 1px; }
            #ticker { font-size: 1rem; }
            #ticker span { font-size: 0.7rem; }
            .floating-photo { border-width: 2px; }
            .focus-box { padding: 20px 15px; width: 90%; }
        }
    </style>

        const startDate = new Date(2025, 8, 17, 0, 0); 
        const viewport = document.getElementById('photo-viewport');
        const ticker = document.getElementById('ticker');

        function spawnPhoto() {
            if (yourPhotos.length === 0) return;
            const photo = document.createElement('img');
            photo.src = yourPhotos[Math.floor(Math.random() * yourPhotos.length)];
            photo.classList.add('floating-photo');

            // Smaller photos for mobile
            const isMobile = window.innerWidth <= 480;
            const width = isMobile ? (Math.random() * 80 + 60) : (Math.random() * 150 + 100);
            
            photo.style.width = width + 'px';
            photo.style.left = (Math.random() * 110 - 5) + 'vw';

            const depth = Math.random();
            const duration = (depth * 20 + 20) + 's';
            photo.style.animationDuration = duration;
            photo.style.zIndex = Math.floor(depth * 5); 
            photo.style.opacity = (depth * 0.4 + 0.2);

            viewport.appendChild(photo);
            setTimeout(() => photo.remove(), parseFloat(duration) * 1000);
        }

        function updateTicker() {
            const now = new Date();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / 1000 / 60) % 60);
            const pad = (n) => n.toString().padStart(2, '0');
            ticker.innerHTML = `${pad(days)} <span>Days</span> : ${pad(hours)} <span>Hrs</span> : ${pad(mins)} <span>Mins</span>`;
        }

        updateTicker();
        setInterval(updateTicker, 1000);
        setInterval(spawnPhoto, 1500);
        for(let i=0; i<6; i++) { setTimeout(spawnPhoto, i * 400); }
